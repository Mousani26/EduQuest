<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
    :root {
      --bg-color: #0D1117;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --glow-color: rgba(0, 255, 255, 0.5);
    }
    body {
      font-family: 'Poppins', sans-serif;
    }
    .glassmorphism {
      background: rgba(17, 24, 39, 0.6);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
    }
    .card-glow {
      transition: box-shadow 0.3s ease-in-out;
    }
    .card-glow:hover {
      box-shadow: 0 0 15px 5px var(--glow-color);
    }
    .card-gradient-1 {
      background-image: linear-gradient(to bottom right, rgba(0, 150, 255, 0.1), rgba(0, 50, 100, 0.1));
    }
    .card-gradient-2 {
      background-image: linear-gradient(to bottom right, rgba(0, 255, 150, 0.1), rgba(0, 100, 50, 0.1));
    }
    .card-gradient-3 {
      background-image: linear-gradient(to bottom right, rgba(255, 150, 0, 0.1), rgba(100, 50, 0, 0.1));
    }
    .card-gradient-4 {
      background-image: linear-gradient(to bottom right, rgba(150, 0, 255, 0.1), rgba(50, 0, 100, 0.1));
    }
     .card-gradient-5 {
      background-image: linear-gradient(to bottom right, rgba(255, 0, 150, 0.1), rgba(100, 0, 50, 0.1));
    }
     .card-gradient-6 {
      background-image: linear-gradient(to bottom right, rgba(0, 255, 255, 0.1), rgba(0, 100, 100, 0.1));
    }
     .card-gradient-7 {
      background-image: linear-gradient(to bottom right, rgba(255, 255, 0, 0.1), rgba(100, 100, 0, 0.1));
    }
    .fade-in-scale-up {
        animation: fadeInScaleUp 0.5s ease-in-out forwards;
    }
    @keyframes fadeInScaleUp {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
    .particle-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        background: var(--bg-color);
    }.particle {
        position: absolute;
        border-radius: 50%;
        background: var(--glow-color);
        animation: float 25s infinite linear;
        opacity: 0;
    }
    @keyframes float {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        50% { opacity: 0.7; }
        100% { transform: translateY(-100vh) translateX(20vw); opacity: 0;}
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
