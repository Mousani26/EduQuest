<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Lab - Pendulum Simulation</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #container { 
            position: relative;
            width: 100vw; 
            height: 100vh; 
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .slider-container {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
        }
        .value-display {
            display: inline-block;
            width: 60px;
            text-align: right;
        }
        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #data-display {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="ui-panel">
        <h2>Pendulum Controls</h2>
        
        <div class="slider-container">
            <label for="length-slider">Length: <span id="length-value" class="value-display">5.0</span> m</label>
            <input type="range" id="length-slider" min="1" max="10" step="0.1" value="5">
        </div>
        
        <div class="slider-container">
            <label for="gravity-slider">Gravity: <span id="gravity-value" class="value-display">9.8</span> m/s²</label>
            <input type="range" id="gravity-slider" min="1" max="20" step="0.1" value="9.8">
        </div>
        
        <div class="slider-container">
            <label for="angle-slider">Initial Angle: <span id="angle-value" class="value-display">30</span>°</label>
            <input type="range" id="angle-slider" min="5" max="80" step="1" value="30">
        </div>
        
        <div>
            <button id="start-btn">Start</button>
            <button id="pause-btn">Pause</button>
            <button id="reset-btn">Reset</button>
        </div>
        
        <div id="data-display">
            <h3>Measurements</h3>
            <div class="data-row">
                <span>Period:</span>
                <span id="period-value">0.00 s</span>
            </div>
            <div class="data-row">
                <span>Angle:</span>
                <span id="current-angle">0.00°</span>
            </div>
            <div class="data-row">
                <span>Velocity:</span>
                <span id="velocity-value">0.00 m/s</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Initialize variables
        let scene, camera, renderer;
        let pendulum, pivot, string;
        let length = 5;
        let gravity = 9.8;
        let angle = 30 * Math.PI / 180; // Convert to radians
        let angularVelocity = 0;
        let isRunning = false;
        let clock = new THREE.Clock();
        
        // Initialize Three.js scene
        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            
            // Create camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            
            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Add lights
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);
            
            // Create grid helper
            const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
            gridHelper.rotation.x = Math.PI / 2;
            scene.add(gridHelper);
            
            // Create pendulum components
            createPendulum();
            
            // Add event listeners
            setupEventListeners();
            
            // Start animation
            animate();
        }
        
        // Create pendulum objects
        function createPendulum() {
            // Remove existing pendulum if any
            if (pivot) scene.remove(pivot);
            if (string) scene.remove(string);
            if (pendulum) scene.remove(pendulum);
            
            // Create pivot point
            const pivotGeometry = new THREE.SphereGeometry(0.2, 32, 32);
            const pivotMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            pivot = new THREE.Mesh(pivotGeometry, pivotMaterial);
            pivot.position.set(0, 0, 0);
            scene.add(pivot);
            
            // Create string
            const stringGeometry = new THREE.CylinderGeometry(0.02, 0.02, length);
            const stringMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
            string = new THREE.Mesh(stringGeometry, stringMaterial);
            string.position.set(0, -length/2, 0);
            scene.add(string);
            
            // Create pendulum bob
            const bobRadius = 0.5;
            const bobGeometry = new THREE.SphereGeometry(bobRadius, 32, 32);
            const bobMaterial = new THREE.MeshPhongMaterial({ color: 0x1e88e5 });
            pendulum = new THREE.Mesh(bobGeometry, bobMaterial);
            pendulum.position.set(length * Math.sin(angle), -length * Math.cos(angle), 0);
            scene.add(pendulum);
            
            // Update string position and rotation
            updateString();
        }
        
        // Update string position and rotation based on pendulum angle
        function updateString() {
            const bobPosition = pendulum.position;
            string.position.set(bobPosition.x / 2, bobPosition.y / 2, 0);
            string.scale.y = length;
            string.rotation.z = Math.atan2(bobPosition.x, -bobPosition.y);
        }
        
        // Update physics simulation
        function updatePhysics(deltaTime) {
            if (!isRunning) return;
            
            // Simple pendulum differential equation: d²θ/dt² = - (g/L) * sin(θ)
            const angularAcceleration = - (gravity / length) * Math.sin(angle);
            
            // Update angular velocity and angle using Euler integration
            angularVelocity += angularAcceleration * deltaTime;
            angle += angularVelocity * deltaTime;
            
            // Update pendulum position
            pendulum.position.set(length * Math.sin(angle), -length * Math.cos(angle), 0);
            
            // Update string
            updateString();
            
            // Update data display
            updateDataDisplay();
        }
        
        // Update the data display panel
        function updateDataDisplay() {
            // Calculate period (T = 2π√(L/g) for small angles)
            const period = 2 * Math.PI * Math.sqrt(length / gravity);
            document.getElementById('period-value').textContent = period.toFixed(2) + ' s';
            
            // Current angle in degrees
            const angleDeg = angle * 180 / Math.PI;
            document.getElementById('current-angle').textContent = angleDeg.toFixed(2) + '°';
            
            // Velocity (v = L * ω)
            const velocity = length * angularVelocity;
            document.getElementById('velocity-value').textContent = velocity.toFixed(2) + ' m/s';
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = clock.getDelta();
            updatePhysics(deltaTime);
            
            renderer.render(scene, camera);
        }
        
        // Set up UI event listeners
        function setupEventListeners() {
            // Length slider
            const lengthSlider = document.getElementById('length-slider');
            const lengthValue = document.getElementById('length-value');
            lengthSlider.addEventListener('input', function() {
                length = parseFloat(this.value);
                lengthValue.textContent = length.toFixed(1);
                createPendulum();
            });
            
            // Gravity slider
            const gravitySlider = document.getElementById('gravity-slider');
            const gravityValue = document.getElementById('gravity-value');
            gravitySlider.addEventListener('input', function() {
                gravity = parseFloat(this.value);
                gravityValue.textContent = gravity.toFixed(1);
            });
            
            // Angle slider
            const angleSlider = document.getElementById('angle-slider');
            const angleValue = document.getElementById('angle-value');
            angleSlider.addEventListener('input', function() {
                const angleDeg = parseFloat(this.value);
                angleValue.textContent = angleDeg.toFixed(0);
                angle = angleDeg * Math.PI / 180;
                if (!isRunning) {
                    createPendulum();
                }
            });
            
            // Control buttons
            document.getElementById('start-btn').addEventListener('click', function() {
                isRunning = true;
                clock.start();
            });
            
            document.getElementById('pause-btn').addEventListener('click', function() {
                isRunning = false;
            });
            
            document.getElementById('reset-btn').addEventListener('click', function() {
                isRunning = false;
                angle = parseFloat(angleSlider.value) * Math.PI / 180;
                angularVelocity = 0;
                createPendulum();
                updateDataDisplay();
            });
            
            // Window resize handler
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        // Start everything
        init();
    </script>
</body>
</html>
