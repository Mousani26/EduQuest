<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Registration Section -->
    <div class="form-box register animation">
      <h2 style="--i:17;">Sign Up</h2>
      <form action="">
        <div class="input-box" style="--i:18;">
          <input type="text" required>
          <label>UserName</label>
          <i class="bx bxs-user-circle"></i>
        </div>

        <div class="input-box" style="--i:19;">
          <input type="email" required>
          <label>Email</label>
          <i class="bx bxs-envelope"></i>
        </div>

        <div class="input-box" style="--i:20;">
          <input type="password" required>
          <label>Password</label>
          <i class="bx bxs-lock-alt"></i>
        </div>

        <button class="btn" style="--i:21;" type="submit">SignUp</button>

        <div class="logreg-link" style="--i:22;">
          <p>Already have an account? <a href="#" class="login-link">Login</a></p>
        </div>
      </form>
    </div>

    <div class="info-text register animation">
      <h2 style="--i:17;">Register Yourself!</h2>
      <p style="--i:18;">Join us and explore more 🚀</p>
    </div>
  </div>
 <script src="scriptq.js"></script>
</body>
</html>
