<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Periodic Table Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #2c5364);
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
    }

    main {
      display: flex;
      justify-content: space-around;
      padding: 2rem;
    }

    .table-container {
      display: grid;
      grid-template-columns: repeat(13, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 5px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }

    .cell {
      background: rgba(255,255,255,0.1);
      border: 1px solid white;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 14px;
    }

    .cell.correct {
      background: #4caf50;
    }

    .cell.incorrect {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .elements-pool {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 200px;
    }

    .element {
      background: #0072ff;
      padding: 10px;
      border-radius: 5px;
      cursor: grab;
      text-align: center;
    }

    .element:active { cursor: grabbing; }

    footer {
      text-align: center;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <header>
    <h1>🧪 Periodic Table Game</h1>
    <p>Drag and drop elements to the correct positions using hints!</p>
  </header>

  <main>
    <section class="table-container" id="periodic-table">
      <!-- Grid will be generated by JS -->
    </section>

    <section class="elements-pool" id="elements-pool">
      <h2>Elements</h2>
      <!-- Draggable elements will be added here -->
    </section>
  </main>

  <footer>
    <p>Score: <span id="score">0</span> / <span id="total">5</span></p>
  </footer>

  <script>
    // Elements for the game
    const elements = [
      {symbol: 'H', name: 'Hydrogen', row: 1, col: 1, hint: 'Lightest element'},
      {symbol: 'He', name: 'Helium', row: 1, col: 13, hint: 'Noble gas'},
      {symbol: 'Li', name: 'Lithium', row: 2, col: 1, hint: 'Alkali metal'},
      {symbol: 'Be', name: 'Beryllium', row: 2, col: 2, hint: 'Alkaline earth metal'},
      {symbol: 'B', name: 'Boron', row: 2, col: 13, hint: 'Metalloid'}
    ];

    let score = 0;
    document.getElementById('total').textContent = elements.length;
    document.getElementById('score').textContent = score;

    const table = document.getElementById('periodic-table');
    const pool = document.getElementById('elements-pool');

    // Generate empty grid
    for(let r=1; r<=3; r++){
      for(let c=1; c<=13; c++){
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.dataset.row = r;
        cell.dataset.col = c;
        table.appendChild(cell);

        cell.addEventListener('dragover', e => e.preventDefault());
        cell.addEventListener('drop', e => {
          const symbol = e.dataTransfer.getData('text/plain');
          const element = elements.find(el => el.symbol === symbol);
          if(element.row == r && element.col == c){
            cell.textContent = symbol;
            cell.classList.add('correct');
            score++;
            document.getElementById('score').textContent = score;
          } else {
            cell.classList.add('incorrect');
            setTimeout(()=>cell.classList.remove('incorrect'),300);
            alert(`Hint: ${element.hint}`);
          }
        });
      }
    }

    // Generate draggable elements
    elements.forEach(el => {
      const div = document.createElement('div');
      div.classList.add('element');
      div.textContent = el.symbol;
      div.draggable = true;
      div.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', el.symbol);
      });
      pool.appendChild(div);
    });
  </script>
</body>
</html>
