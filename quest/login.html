<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">

    <!-- Background Animation -->
    <span class="bg-animate"></span>
    <span class="bg-animate2"></span>

    <!-- Login Section -->
    <div class="form-box login animation">
      <h2 style="--i:0;">Login</h2>
      <form action="">
        <div class="input-box" style="--i:1;">
          <input type="text" required>
          <label>UserName</label>
          <i class="bx bxs-user-circle"></i>
        </div>

        <div class="input-box" style="--i:2;">
          <input type="password" required>
          <label>Password</label>
          <i class="bx bxs-lock-alt"></i>
        </div>

        <button class="btn" style="--i:3;" type="submit">Login</button>

        <div class="logreg-link" style="--i:4;">
          <p>Don’t have an account? <a href="#" class="register-link">Signup</a></p>
        </div>
      </form>
    </div>

    <div class="info-text login animation">
      <h2 style="--i:0;">Welcome Back!</h2>
      <p style="--i:1;">Glad to see you again 😊</p>
    </div>

    <!-- Registration Section -->
    <div class="form-box register animation">
      <h2 style="--i:17;">Sign Up</h2>
      <form action="">
        <div class="input-box" style="--i:18;">
          <input type="text" required>
          <label>UserName</label>
          <i class="bx bxs-user-circle"></i>
        </div>

        <div class="input-box" style="--i:19;">
          <input type="email" required>
          <label>Email</label>
          <i class="bx bxs-envelope"></i>
        </div>

        <div class="input-box" style="--i:20;">
          <input type="password" required>
          <label>Password</label>
          <i class="bx bxs-lock-alt"></i>
        </div>

        <button class="btn" style="--i:21;" type="submit">SignUp</button>

        <div class="logreg-link" style="--i:22;">
          <p>Already have an account? <a href="#" class="login-link">Login</a></p>
        </div>
      </form>
    </div>

    <div class="info-text register animation">
      <h2 style="--i:17;">Register Yourself!</h2>
      <p style="--i:18;">Join us and explore more 🚀</p>
    </div>
  </div>

  <script src="scriptq.js"></script>
</body>
</html>
