<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Periodic Table Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🧪 Periodic Table Game</h1>
    <p>Drag and drop elements to the correct positions using hints!</p>
  </header>

  <main>
    <section class="table-container" id="periodic-table">
      <!-- Grid will be generated by JS -->
    </section>

    <section class="elements-pool" id="elements-pool">
      <h2>Elements</h2>
      <!-- Draggable elements will be added here -->
    </section>
  </main>

  <footer>
    <p>Score: <span id="score">0</span> / <span id="total">5</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
