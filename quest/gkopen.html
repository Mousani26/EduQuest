<div class="flex flex-col gap-3">
<div class="flex justify-between">
<label class="text-white text-base font-medium">Initial Velocity</label>
<span class="text-[var(--neutral-400)] text-sm">20 m/s</span>
</div>
<input class="h-2 w-full cursor-pointer appearance-none rounded-lg bg-[var(--neutral-600)] accent-[var(--primary-500)]" max="100" min="0" type="range" value="20"/>
</div>
<div class="flex flex-col gap-3">
<div class="flex justify-between">
<label class="text-white text-base font-medium">Launch Angle</label>
<span class="text-[var(--neutral-400)] text-sm">45°</span>
</div>
<input class="h-2 w-full cursor-pointer appearance-none rounded-lg bg-[var(--neutral-600)] accent-[var(--primary-500)]" max="90" min="0" type="range" value="45"/>
</div>
<div class="flex flex-col gap-3">
<div class="flex justify-between">
<label class="text-white text-base font-medium">Gravity</label>
<span class="text-[var(--neutral-400)] text-sm">9.8 m/s²</span>
</div>

<button class="flex-1 rounded-md h-10 px-4 bg-[var(--primary-500)] hover:bg-[var(--primary-600)] text-white text-sm font-bold transition-colors">Launch</button>
</a>
<button class="flex-1 rounded-md h-10 px-4 bg-[var(--neutral-700)] hover:bg-[var(--neutral-600)] text-white text-sm font-bold transition-colors">Reset</button>

<p class="text-white text-sm font-medium">20.4 m</p>
</div>
</div>
</div>

<p class="text-[var(--neutral-400)]"><span class="text-white">Vertical:</span> y(t) = v₀ᵧt - ½gt²</p>
